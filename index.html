<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard – Kelulusan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {font-family: 'Inter', sans-serif; background: linear-gradient(135deg,#0f0c29,#302b63,#24243e); min-height:100vh; color:#fff; display:flex; flex-direction:column; align-items:center; padding:2rem;}
    .card {background:rgba(255,255,255,0.08); backdrop-filter:blur(12px); border-radius:12px; padding:1.5rem; width:100%; max-width:1000px; box-shadow:0 8px 32px 0 rgba(31,38,135,0.37);}
    h1{font-size:2rem;margin-bottom:1rem;}
    table{width:100%;border-collapse:collapse;}
    th,td{padding:0.75rem;text-align:left;}
    th{background:rgba(255,255,255,0.12);}
    tr:nth-child(even){background:rgba(255,255,255,0.04);}
    button{background:#6c63ff;border:none;border-radius:6px;color:#fff;padding:0.5rem 1rem;cursor:pointer;transition:background .2s;}
    button:hover{background:#5a54d1;}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);opacity:0;visibility:hidden;transition:opacity .3s;}
    .modal.active{opacity:1;visibility:visible;}
    .modal-content{background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);border-radius:10px;padding:2rem;width:90%;max-width:500px;color:#fff;}
    .form-group{margin-bottom:1rem;}
    .form-group label{display:block;margin-bottom:0.3rem;}
    .form-group input,.form-group select{width:100%;padding:0.5rem;border:none;border-radius:4px;}
  </style>
</head>
<body>
  <section class="card">
    <h1>📊 Admin Dashboard – Kelulusan</h1>
    <button id="btnAdd">Tambah Siswa</button>
    <table>
      <thead>
        <tr>
          <th>No Peserta</th>
          <th>NISN</th>
          <th>Nama</th>
          <th>JK</th>
          <th>Keterangan</th>
          <th>Rata‑Rata</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="tblBody"></tbody>
    </table>
  </section>

  <div class="modal" id="studentModal">
    <div class="modal-content">
      <h2 id="modalTitle">Tambah Siswa</h2>
      <form id="studentForm">
        <input type="hidden" id="studentId" />
        <div class="form-group"><label for="noPeserta">No Peserta</label><input type="text" id="noPeserta" required /></div>
        <div class="form-group"><label for="nisn">NISN</label><input type="text" id="nisn" required /></div>
        <div class="form-group"><label for="nama">Nama</label><input type="text" id="nama" required /></div>
        <div class="form-group"><label for="jk">JK</label><select id="jk" required><option value="Laki-laki">Laki‑laki</option><option value="Perempuan">Perempuan</option></select></div>
        <div class="form-group"><label for="keterangan">Keterangan</label><select id="keterangan" required><option value="LULUS">LULUS</option><option value="TIDAK LULUS">TIDAK LULUS</option></select></div>
        <div class="form-group"><label for="rataRata">Rata‑Rata</label><input type="number" step="0.01" id="rataRata" required /></div>
        <button type="submit">Simpan</button>
        <button type="button" id="btnClose">Batal</button>
      </form>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
